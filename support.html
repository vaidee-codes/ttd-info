<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTD Autofill Extension — Support</title>
    <style>
        :root {
            --primary: #7c3aed;
            --primary-dark: #6d28d9;
            --primary-light: #8b5cf6;
            --primary-muted: #f3eeff;
            --bg: #f7f7fb;
            --surface: #ffffff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow-md: 0 4px 14px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 24px 60px rgba(76, 29, 149, 0.18);
            --radius: 12px;
            --radius-lg: 20px;
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.65;
            color: var(--text);
            background:
                radial-gradient(1200px 600px at 0% -10%, rgba(124, 58, 237, 0.18), transparent 60%),
                radial-gradient(1000px 500px at 100% 0%, rgba(139, 92, 246, 0.15), transparent 60%),
                var(--bg);
            min-height: 100vh;
            padding: 32px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 720px;
            width: 100%;
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        header {
            position: relative;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 48px 32px 40px;
            text-align: center;
            overflow: hidden;
        }

        header::before {
            content: "";
            position: absolute;
            inset: -40% -10% auto auto;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 70%);
            pointer-events: none;
        }

        header h1 {
            font-size: clamp(1.7rem, 4vw, 2.2rem);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            font-weight: 800;
        }

        header p {
            font-size: 1.05rem;
            opacity: 0.92;
            font-weight: 500;
        }

        .content {
            padding: 40px 32px;
        }

        .lead {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 28px;
            font-size: 1rem;
        }

        .lead strong {
            color: var(--text);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .contact-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            text-decoration: none;
            color: var(--text);
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .contact-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .contact-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: var(--primary-muted);
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .contact-body {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .contact-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .contact-value {
            font-size: 1rem;
            color: var(--text);
            font-weight: 600;
            word-break: break-word;
        }

        .contact-card:hover .contact-value {
            color: var(--primary-dark);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 32px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 8px;
            transition: background var(--transition), color var(--transition);
        }

        .back-link:hover {
            background: var(--primary-muted);
            color: var(--primary-dark);
        }

        .back-link-wrap {
            text-align: center;
        }

        footer {
            background: var(--primary-muted);
            padding: 20px 32px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 540px) {
            .content {
                padding: 32px 22px;
            }

            header {
                padding: 40px 20px 32px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>📬 Support &amp; Contact</h1>
            <p>Get help or get in touch with the developer</p>
        </header>

        <div class="content">
            <p class="lead">
                Have questions, suggestions, or found a bug? Pick whichever channel suits you best — <strong>I read every message.</strong>
            </p>

            <div class="contact-grid">
                <a href="mailto:ttdautofill@gmail.com" class="contact-card">
                    <span class="contact-icon">📧</span>
                    <span class="contact-body">
                        <span class="contact-label">Email</span>
                        <span class="contact-value">ttdautofill@gmail.com</span>
                    </span>
                </a>

                <a href="https://www.reddit.com/user/Logical-Delivery6183/" target="_blank" rel="noopener noreferrer" class="contact-card">
                    <span class="contact-icon">🟠</span>
                    <span class="contact-body">
                        <span class="contact-label">Reddit</span>
                        <span class="contact-value">u/Logical-Delivery6183</span>
                    </span>
                </a>
            </div>

            <div class="back-link-wrap">
                <a href="index.html" class="back-link">← Back to User Guide</a>
            </div>
        </div>

        <footer>
            TTD Autofill Extension ·
            <a href="PRIVACY_POLICY.html" style="color: inherit; text-decoration: underline;">Privacy Policy</a>
        </footer>
    </div>
</body>

</html>
